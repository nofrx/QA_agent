<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoe QA — 3D Model Analysis</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👟</text></svg>">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Shoe <span>QA</span></h1>
      <p>3D model quality analysis pipeline</p>
      <a href="/reports" class="nav-link">Reports Library</a>
    </header>

    <div class="search-section">
      <input type="text" id="sku-input" placeholder="Enter SKU (e.g., F5714D05U-K11)" autocomplete="off" spellcheck="false">
      <button class="btn" id="analyze-btn" onclick="analyzeSku()">Analyze</button>
    </div>

    <div class="mode-section">
      <label class="mode-toggle">
        <input type="checkbox" id="url-mode-toggle" onchange="toggleUrlMode()">
        <span>Manual URL mode</span>
      </label>
      <div class="url-fields" id="url-fields" style="display:none;">
        <input type="text" id="raw-url" placeholder="Raw scan GLB URL" autocomplete="off">
        <input type="text" id="touchedup-url" placeholder="Touched-up GLB URL" autocomplete="off">
        <input type="text" id="autoshadow-url" placeholder="AutoShadow GLB URL" autocomplete="off">
        <details class="helper-details">
          <summary>Get URLs from dashboard console</summary>
          <pre id="snippet-code"></pre>
          <button class="btn-small" onclick="copySnippet()">Copy</button>
          <textarea id="json-paste" placeholder='Paste JSON output here...' rows="2"></textarea>
          <button class="btn-small" onclick="parseJsonPaste()">Fill URLs</button>
        </details>
      </div>
    </div>

    <div class="progress-section" id="progress-section">
      <div class="progress-header" id="progress-header">
        <div class="spinner"></div>
        <span>Analyzing...</span>
      </div>
      <div class="progress-feed" id="progress-feed"></div>
    </div>

    <div class="result-section" id="result-section"></div>

    <div class="error-card" id="error-card">
      <h3>Analysis Failed</h3>
      <p></p>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
